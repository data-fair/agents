name: Quality checks

on:
  workflow_call:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout git repository
      uses: actions/checkout@v4

    - uses: actions/setup-node@v3
      with:
        node-version: 24
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build types
      run: npm run build-types

    - name: Build UI
      run: npm -w ui run build

    - name: Type check
      run: npm -w ui run check-types

    - name: Init env
      run: bash dev/init-env.sh

    - name: Start dev dependencies
      run: docker compose up -d --wait

    - name: Start dev API
      run: dotenv -- npm run dev-api &

    - name: Run unit tests
      run: npm run test-unit

    - name: Run API tests
      run: npm run test-api